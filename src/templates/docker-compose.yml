services:
  delega:
    image: ghcr.io/delega-dev/delega:__DELEGA_VERSION__
    restart: unless-stopped
    ports:
      # Change to 127.0.0.1:__DELEGA_PORT__:18890 to restrict to this machine only
      - "__DELEGA_PORT__:18890"
    volumes:
      - delega-data:/app/.delega

volumes:
  delega-data:
